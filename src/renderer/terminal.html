<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Code</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d0d0d;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    #titlebar {
      -webkit-app-region: drag;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.85);
      user-select: none;
      -webkit-user-select: none;
      flex-shrink: 0;
    }
    #tabbar {
      display: flex;
      height: 28px;
      flex-shrink: 0;
      align-items: stretch;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.7);
      user-select: none;
      -webkit-user-select: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .tab {
      -webkit-app-region: no-drag;
      display: flex;
      align-items: center;
      padding: 0 28px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s ease;
      gap: 8px;
      white-space: nowrap;
    }
    .tab:hover {
      color: rgba(255, 255, 255, 0.9);
      background: rgba(255, 255, 255, 0.04);
    }
    .tab.active {
      color: rgba(255, 255, 255, 0.95);
      border-bottom-color: currentColor;
    }
    .tab-icon {
      font-size: 11px;
      opacity: 0.7;
    }
    .tab-label[contenteditable="true"] {
      outline: none;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      padding: 0 4px;
      min-width: 30px;
    }
    .tab-close {
      width: 16px; height: 16px;
      border: none; border-radius: 3px;
      background: transparent;
      color: rgba(255, 255, 255, 0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      padding: 0;
      line-height: 1;
      margin-left: 2px;
    }
    .tab-close:hover {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
    }
    #add-tab-btn {
      -webkit-app-region: no-drag;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.3);
      transition: all 0.15s ease;
      font-size: 18px;
      flex-shrink: 0;
    }
    #add-tab-btn:hover {
      color: rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.04);
    }

    /* ─── Main content area ─── */
    #main-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ─── Sidebar ─── */
    #sidebar {
      width: 36px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 10px;
      padding-bottom: 10px;
      gap: 6px;
      border-right: 1px solid rgba(255, 255, 255, 0.06);
      overflow-y: auto;
    }
    #sidebar::-webkit-scrollbar { width: 0; }
    #custom-snippets {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .snippet-separator {
      width: 20px;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
    }
    .sidebar-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, 0.45);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: all 0.15s ease;
      padding: 0;
    }
    .sidebar-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.8);
    }
    .sidebar-btn.active {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.9);
    }
    .sidebar-btn.dragging {
      opacity: 0.3;
    }
    .sidebar-btn.drag-over {
      box-shadow: 0 -2px 0 0 rgba(255,255,255,0.4);
    }

    /* ─── Drop overlay ─── */
    #drop-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #drop-overlay.visible { display: flex; }
    #drop-overlay-inner {
      border: 2px dashed rgba(255,255,255,0.4);
      border-radius: 12px;
      padding: 24px 36px;
      color: rgba(255,255,255,0.7);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 14px;
      font-weight: 600;
    }

    /* ─── Terminal container ─── */
    #terminal-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .terminal-pane {
      position: absolute;
      inset: 0;
      display: none;
    }
    .terminal-pane.active {
      display: block;
    }
  </style>
</head>
<body>
  <div id="titlebar"></div>
  <div id="tabbar">
    <div id="tab-claude" class="tab active" data-tab="claude">
      <span class="tab-icon">&#10022;</span>
      <span>Claude</span>
    </div>
    <div id="add-tab-btn" title="New Shell Tab">+</div>
  </div>
  <div id="main-area">
    <div id="sidebar">
      <button id="notes-btn" class="sidebar-btn sidebar-reorderable" data-sidebar-id="notes" title="Notes">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 2.5h10a.5.5 0 0 1 .5.5v10a.5.5 0 0 1-.5.5H3a.5.5 0 0 1-.5-.5V3a.5.5 0 0 1 .5-.5z" stroke="currentColor" stroke-width="1.2"/>
          <path d="M5 5.5h6M5 8h6M5 10.5h3.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
        </svg>
      </button>
      <button id="skills-btn" class="sidebar-btn sidebar-reorderable" data-sidebar-id="skills" title="Slash Commands">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 2.5L6 13.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
      <button id="skillbrowser-btn" class="sidebar-btn sidebar-reorderable" data-sidebar-id="skillbrowser" title="Skills">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 1.5l1.8 3.7 4 .6-2.9 2.8.7 4L8 10.8 4.4 12.6l.7-4L2.2 5.8l4-.6L8 1.5z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="filetree-btn" class="sidebar-btn sidebar-reorderable" data-sidebar-id="filetree" title="File Tree">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M6 3h7M6 6.5h7M6 10h5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
          <path d="M3 3h0M3 6.5h0M3 10h0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M2 12.5h12" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" opacity="0.4"/>
        </svg>
      </button>
      <button id="model-btn" class="sidebar-btn sidebar-reorderable" data-sidebar-id="model" title="Switch Model">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 2v12M4 6l4-4 4 4M4 10l4 4 4-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="github-btn" class="sidebar-btn sidebar-reorderable" data-sidebar-id="github" title="Open GitHub Repo" style="display:none">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </button>
      <button id="prompthistory-btn" class="sidebar-btn sidebar-reorderable" data-sidebar-id="prompthistory" title="Prompt History">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.2"/>
          <path d="M8 4.5v4l2.5 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="imagegallery-btn" class="sidebar-btn sidebar-reorderable" data-sidebar-id="imagegallery" title="Image Gallery">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="3" width="12" height="10" rx="1.5" stroke="currentColor" stroke-width="1.1"/>
          <circle cx="5.5" cy="6.5" r="1.2" stroke="currentColor" stroke-width="1"/>
          <path d="M2 10.5l3-3 2.5 2.5L10 7.5l4 4" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="openfolder-btn" class="sidebar-btn sidebar-reorderable" data-sidebar-id="openfolder" title="Open Folder">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 4.5v8a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-6a1 1 0 0 0-1-1H8L6.5 3.5H3a1 1 0 0 0-1 1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="savepreset-btn" class="sidebar-btn sidebar-reorderable" data-sidebar-id="savepreset" title="Save as Preset">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3.5 2h7.09L13 4.41V12.5a1 1 0 0 1-1 1h-8a1 1 0 0 1-1-1v-9.5a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/>
          <path d="M5.5 2v3.5h5V2" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/>
          <rect x="5" y="8.5" width="6" height="3" rx="0.5" stroke="currentColor" stroke-width="1"/>
        </svg>
      </button>
      <button id="slack-btn" class="sidebar-btn sidebar-reorderable" data-sidebar-id="slack" title="Share to Slack">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M5.042 15.165a2.528 2.528 0 0 1-2.52 2.523A2.528 2.528 0 0 1 0 15.165a2.527 2.527 0 0 1 2.522-2.52h2.52v2.52zm1.271 0a2.527 2.527 0 0 1 2.521-2.52 2.527 2.527 0 0 1 2.521 2.52v6.313A2.528 2.528 0 0 1 8.834 24a2.528 2.528 0 0 1-2.521-2.522v-6.313z" fill="currentColor" opacity="0.9"/>
          <path d="M8.834 5.042a2.528 2.528 0 0 1-2.521-2.52A2.528 2.528 0 0 1 8.834 0a2.528 2.528 0 0 1 2.521 2.522v2.52H8.834zm0 1.271a2.528 2.528 0 0 1 2.521 2.521 2.528 2.528 0 0 1-2.521 2.521H2.522A2.528 2.528 0 0 1 0 8.834a2.528 2.528 0 0 1 2.522-2.521h6.312z" fill="currentColor" opacity="0.7"/>
          <path d="M18.956 8.834a2.528 2.528 0 0 1 2.522-2.521A2.528 2.528 0 0 1 24 8.834a2.528 2.528 0 0 1-2.522 2.521h-2.522V8.834zm-1.268 0a2.528 2.528 0 0 1-2.523 2.521 2.527 2.527 0 0 1-2.52-2.521V2.522A2.527 2.527 0 0 1 15.165 0a2.528 2.528 0 0 1 2.523 2.522v6.312z" fill="currentColor" opacity="0.8"/>
          <path d="M15.165 18.956a2.528 2.528 0 0 1 2.523 2.522A2.528 2.528 0 0 1 15.165 24a2.527 2.527 0 0 1-2.52-2.522v-2.522h2.52zm0-1.268a2.527 2.527 0 0 1-2.52-2.523 2.526 2.526 0 0 1 2.52-2.52h6.313A2.527 2.527 0 0 1 24 15.165a2.528 2.528 0 0 1-2.522 2.523h-6.313z" fill="currentColor" opacity="0.6"/>
        </svg>
      </button>
      <div id="custom-snippets"></div>
      <button id="add-snippet-btn" class="sidebar-btn" title="Add Quick Snippet">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div id="terminal-container">
      <div id="terminal" class="terminal-pane active"></div>
    </div>
  </div>
  <div id="drop-overlay"><div id="drop-overlay-inner">Drop files here</div></div>
  <script type="module" src="./terminal-main.ts"></script>
</body>
</html>
